version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sga-postgres
    environment:
      POSTGRES_DB: sga_db
      POSTGRES_USER: sga_user
      POSTGRES_PASSWORD: sga_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sga_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
