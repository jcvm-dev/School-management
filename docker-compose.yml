version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sga-postgres
    environment:
      POSTGRES_DB: sga_db
      POSTGRES_USER: sga_user
      POSTGRES_PASSWORD: sga_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sga_user -d sga_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./school-management-be
      dockerfile: Dockerfile
    container_name: sga-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sga_db
      SPRING_DATASOURCE_USERNAME: sga_user
      SPRING_DATASOURCE_PASSWORD: sga_password
      JWT_SECRET: ${JWT_SECRET:-E94Vgp65TsyawiA4P5kWIEftG7A6hASLEQ7poj8K94q1paWR2pEGHf35snedMkvbnct0fdsppA4RoeqGkkyhGw==}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./school-management-fe
      dockerfile: Dockerfile
    container_name: sga-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
